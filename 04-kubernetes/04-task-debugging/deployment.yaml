apiVersion: apps/v1
kind: Deployment
metadata:
  name: broken-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: broken-app
  template:
    metadata:
      labels:
        app: broken-app
    spec:
      containers:
      - name: broken-app
        image: nginxx:1.14.2 # This image name is intentionally incorrect
        ports:
        - containerPort: 80
        resources:
         limits:
            memory: "128Mi"
            cpu: "500m"
         requests:
            memory: "64Mi"
            cpu: "250m"
