apiVersion: apps/v1
kind: Deployment
metadata:
  name: pending-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: pending-app
  template:
    metadata:
      labels:
        app: pending-app
    spec:
      containers:
      - name: pending-app
        image: nginx
        ports:
        - containerPort: 80
        resources:
          requests:
            cpu: "1000" # 1000 CPU cores
