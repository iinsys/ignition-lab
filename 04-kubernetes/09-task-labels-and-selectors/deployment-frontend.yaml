apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
        env: production
    spec:
      containers:
      - name: nginx
        image: nginx
        ports:
        - containerPort: 80
