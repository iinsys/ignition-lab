apiVersion: apps/v1
kind: Deployment
metadata:
  name: oomkilled-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: oomkilled-app
  template:
    metadata:
      labels:
        app: oomkilled-app
    spec:
      containers:
      - name: oomkilled-app
        image: polinux/stress
        command: ["stress"]
        args: ["--vm", "1", "--vm-bytes", "150M", "--vm-hang", "1"]
        resources:
          limits:
            memory: "64Mi"
          requests:
            memory: "64Mi"
